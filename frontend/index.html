<html>
<head>
    <title>Eco Rewards</title>
    <style>
        body 
        {
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            background-color: whitesmoke;
            margin: 10px;
            padding: 10px;
            background-position: center;
            background-image: url("assets/background.jpg");
            background-size: cover;
            background-repeat: no-repeat;
        }
        h1
        {
            margin-top: 20px;
            text-size-adjust: 30px;
            text-decoration: underline wavy green;
        }
        .card 
        {
            background-color: rgb(243, 241, 241);
            color: rgb(0, 0, 0);
            border: 5px solid rgb(24, 237, 173);
            border-radius: 10px;
            padding: 20px;
            margin: 20px auto;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
            width: 50%;
            max-width: 400px;
            align-items: center;
        }
        .container 
        {
            background-color: rgb(243, 241, 241);
            color: rgb(0, 0, 0);
            border: 5px solid rgb(24, 237, 173);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            margin: 20px auto;
            width: 90%;
            max-width: 400px;
        }
        .btn 
        {
            background-color: rgb(24, 237, 173);
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            border-radius: 5px;
            font-size: 20px;
        }
        .btn:hover 
        {
            background-color: rgb(115, 241, 163);
        }   
        input[type=text], select 
        {
            width: 100%;
            padding: 12px 20px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-sizing: border-box;
        }
        
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .popup-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .popup-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .popup-btn {
            flex: 1;
            margin: 0 10px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .popup-btn-cancel {
            background-color: #ddd;
            color: black;
        }
        .popup-btn-confirm {
            background-color: #f44336;
            color: white;
        }
    </style>
</head>
<body>

    <h1>EcoRewards</h1>
    
    <div class="card">
        <h3>Click to view your activities</h3>
        <a href="dashboard.html" class="btn">View my dashboard</a>
    </div>

    <div class="container">
        <p>Track your EcoRewards</p>
        <input type="text" id="distance" placeholder="Enter distance in km">
        <select id="mode">
            <option value="walk">Walking</option>
            <option value="run">Running</option>    
            <option value="cycle">Cycling</option>
            <option value="ev">Electric Vehicles</option>
            <option value="bus">Bus</option>
            <option value="metro">Metro</option>
        </select>
        <button class="btn" onclick="calculatePoints()">Calculate Points</button>
        <p id="points"></p>
    </div>

    <div class="container">
        <p>Weekly Progress</p>
        <p>Total Distance: <span id="weeklyDistance">0</span> km</p>
        <button class="btn" onclick="showResetConfirmation()">Clear Data</button>
    </div>

    <div id="resetPopup" class="popup-overlay">
        <div class="popup-content">
            <h3>Confirm Reset</h3>
            <p>Are you sure you want to clear all data? This action cannot be undone.</p>
            <div class="popup-buttons">
                <button class="popup-btn popup-btn-cancel" onclick="hideResetConfirmation()">Cancel</button>
                <button class="popup-btn popup-btn-confirm" onclick="clearData()">Reset</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        // Helper: make authenticated API calls
        async function apiCall(url, options = {}) {
        const res = await fetch(url, {
            ...options,
            headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
            ...(options.headers || {})
            }
        });
        if (res.status === 401 || res.status === 403) {
            localStorage.clear();
            window.location.href = 'login.html';
        }
        return res.json();
        }
    function calculatePoints() 
        {
        const distance = parseFloat(document.getElementById("distance").value);
        const mode = document.getElementById("mode").value;
        let points = 0;

        if (mode === "walk") points = distance * 25;
        if (mode === "run") points = distance * 20;
        if (mode === "cycle") points = distance * 35;
        if (mode === "bus") points = distance * 30;
        if (mode === "ev") points = distance * 50;
        if (mode === "metro") points = distance * 45;

        let totalPoints = parseFloat(localStorage.getItem("ecoPoints")) || 0;
        totalPoints += points;
        localStorage.setItem("ecoPoints", totalPoints);

        let totalDistance = parseFloat(localStorage.getItem("totalDistance")) || 0;
        totalDistance += distance;
        localStorage.setItem("totalDistance", totalDistance);

        document.getElementById("points").innerText = `You've earned ${points} points!`;

        updateWeeklyProgress();
        let activities = JSON.parse(localStorage.getItem("ecoActivities")) || [];
        activities.push(`${distance} km by ${mode}`);
        localStorage.setItem("ecoActivities", JSON.stringify(activities));
    }

    function updateWeeklyProgress()
    {
        let totalDistance = parseFloat(localStorage.getItem("totalDistance")) || 0;
        document.getElementById("weeklyDistance").innerText = totalDistance.toFixed(1);
    }

    function showResetConfirmation() 
        {
            document.getElementById("resetPopup").style.display = "flex";
        }

    function hideResetConfirmation() 
        {
            document.getElementById("resetPopup").style.display = "none";
        }
    
    function clearData() 
        {
            localStorage.removeItem("totalDistance");
            localStorage.removeItem("ecoPoints");
            localStorage.removeItem("ecoActivities");
            updateWeeklyProgress();
            hideResetConfirmation();
        }

    window.onload = function ()
    {
        updateWeeklyProgress();
    };

    </script>

</body>
</html>
