<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoRewards — Leaderboard</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/favicon.ico">
    <meta name="theme-color" content="#1a3a2a">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(ellipse at 15% 20%, rgba(74,158,107,0.3) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 80%, rgba(200,169,110,0.18) 0%, transparent 50%),
                linear-gradient(160deg, #0a1f12 0%, #1a3a2a 40%, #0f2a1a 100%);
            padding-bottom: 60px;
        }

        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; animation: orbFloat ease-in-out infinite; }
        .orb1 { width: 600px; height: 600px; background: rgba(74,158,107,0.15); top:-200px; left:-200px; animation-duration:14s; }
        .orb2 { width: 350px; height: 350px; background: rgba(200,169,110,0.12); bottom:-100px; right:-100px; animation-duration:17s; animation-delay:-8s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0);} 50%{transform:translate(10px,-10px);} }

        /* ── NAV ── */
        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 32px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: sticky; top: 0; z-index: 100;
            flex-wrap: wrap; gap: 12px;
        }
        .nav-brand { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #a8d8a8; font-weight: 700; }
        .nav-links { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .nav-link { padding: 8px 16px; border-radius: 10px; font-size: 0.83rem; font-weight: 500; color: rgba(255,255,255,0.6); text-decoration: none; transition: all 0.2s; border: 1px solid transparent; }
        .nav-link:hover { background: rgba(255,255,255,0.08); color: white; border-color: rgba(255,255,255,0.12); }
        .logout-btn { padding: 8px 18px; border-radius: 10px; background: rgba(255,100,100,0.1); border: 1px solid rgba(255,100,100,0.2); color: #fca5a5; font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
        .logout-btn:hover { background: rgba(255,100,100,0.2); }

        /* ── PAGE ── */
        .page { max-width: 640px; margin: 0 auto; padding: 32px 20px; display: flex; flex-direction: column; gap: 24px; position: relative; z-index: 1; }

        /* ── HEADER ── */
        .lb-header {
            text-align: center;
            padding: 36px 24px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 28px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }

        .lb-trophy { font-size: 3.5rem; display: block; margin-bottom: 12px; animation: trophyBounce 2s ease-in-out infinite; }
        @keyframes trophyBounce { 0%,100%{transform:translateY(0) rotate(-5deg);} 50%{transform:translateY(-8px) rotate(5deg);} }

        .lb-title { font-family: 'Playfair Display', serif; font-size: 2rem; background: linear-gradient(135deg, #a8d8a8, #f0e68c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .lb-sub { font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-top: 6px; }

        /* ── MY RANK ── */
        .my-rank {
            background: rgba(234,88,12,0.12);
            border: 1px solid rgba(234,88,12,0.28);
            border-radius: 16px; padding: 16px 24px;
            text-align: center; color: #fb923c;
            font-weight: 600; font-size: 1rem;
        }

        /* ── FILTERS ── */
        .filters { display: flex; gap: 8px; flex-wrap: wrap; }

        .filter-btn {
            padding: 9px 18px;
            border-radius: 999px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.55);
            cursor: pointer; font-size: 0.82rem; font-weight: 500;
            transition: all 0.2s; font-family: 'Inter', sans-serif;
        }

        .filter-btn:hover { background: rgba(255,255,255,0.1); color: white; }

        .filter-btn.active {
            background: rgba(74,158,107,0.25);
            border-color: rgba(74,158,107,0.5);
            color: #a8d8a8;
        }

        /* ── BOARD ── */
        .glass {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.11);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 6px 32px rgba(0,0,0,0.35);
        }

        /* ── TOP 3 PODIUM ── */
        .podium {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 12px; padding: 28px 20px 0;
        }

        .podium-card {
            text-align: center; flex: 1; max-width: 160px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px 18px 0 0;
            padding: 16px 12px 20px;
            position: relative;
            transition: transform 0.2s;
        }
        .podium-card:hover { transform: translateY(-4px); }

        .podium-card.first {
            background: linear-gradient(180deg, rgba(212,175,55,0.2), rgba(212,175,55,0.08));
            border-color: rgba(212,175,55,0.35);
            padding-top: 24px;
        }

        .podium-card.second {
            background: linear-gradient(180deg, rgba(192,192,192,0.15), rgba(192,192,192,0.05));
            border-color: rgba(192,192,192,0.25);
        }

        .podium-card.third {
            background: linear-gradient(180deg, rgba(180,105,55,0.15), rgba(180,105,55,0.05));
            border-color: rgba(180,105,55,0.25);
        }

        .podium-medal { font-size: 2rem; display: block; margin-bottom: 8px; }
        .podium-name { font-size: 0.85rem; font-weight: 600; color: white; margin-bottom: 4px; word-break: break-word; }
        .podium-score { font-size: 1.1rem; font-weight: 700; }
        .podium-score.gold { color: #f0c060; }
        .podium-score.silver { color: #c0c0c0; }
        .podium-score.bronze { color: #cd7f32; }
        .podium-streak { font-size: 0.72rem; color: rgba(255,255,255,0.4); margin-top: 4px; }
        .podium-you { position: absolute; top: 8px; right: 8px; background: rgba(74,158,107,0.4); border-radius: 999px; font-size: 0.65rem; padding: 2px 8px; color: #a8d8a8; font-weight: 600; }

        /* ── REST OF THE BOARD ── */
        .board-rest { padding: 8px 0 8px; }

        .board-row {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .board-row:last-child { border-bottom: none; }
        .board-row:hover { background: rgba(255,255,255,0.04); }
        .board-row.me { background: rgba(74,158,107,0.1); border-left: 3px solid #4a9e6b; }

        .row-rank { font-size: 0.85rem; font-weight: 700; color: rgba(255,255,255,0.4); width: 28px; text-align: center; flex-shrink: 0; }
        .row-name { flex: 1; font-size: 0.9rem; font-weight: 500; color: rgba(255,255,255,0.8); }
        .row-name.me-name { color: #a8d8a8; }
        .row-streak { font-size: 0.78rem; color: #fb923c; flex-shrink: 0; }
        .row-score { font-size: 0.92rem; font-weight: 700; color: #a8d8a8; flex-shrink: 0; }

        .empty-state {
            text-align: center; padding: 48px 24px;
            color: rgba(255,255,255,0.3); font-size: 0.9rem;
        }
        .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 12px; opacity: 0.4; }

        @media(max-width: 500px) { .podium { gap: 8px; } .podium-card { padding: 12px 8px 16px; } }
    </style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<nav>
    <div class="nav-brand">🌿 EcoRewards</div>
    <div class="nav-links">
        <a href="index.html"    class="nav-link">🏠 Log Trip</a>
        <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
        <button class="logout-btn" onclick="logout()">Logout →</button>
    </div>
</nav>

<div class="page">

    <div class="lb-header">
        <span class="lb-trophy">🏆</span>
        <div class="lb-title">Leaderboard</div>
        <div class="lb-sub">Compete with the community. Top eco-warriors win exclusive rewards.</div>
    </div>

    <div class="my-rank" id="myRank">Loading your rank...</div>

    <div class="filters">
        <button class="filter-btn active" onclick="load('points','week',this)">📅 This Week · Points</button>
        <button class="filter-btn" onclick="load('co2','week',this)">🌍 This Week · CO₂</button>
        <button class="filter-btn" onclick="load('points','month',this)">📆 This Month</button>
        <button class="filter-btn" onclick="load('points','all',this)">🏅 All Time</button>
    </div>

    <div class="glass" id="boardWrap">
        <div class="empty-state"><span class="empty-icon">🌱</span>Loading leaderboard...</div>
    </div>

    <div style="text-align:center">
        <a href="dashboard.html" style="color:#a8d8a8;font-size:0.88rem;font-weight:600;text-decoration:none">← Back to Dashboard</a>
    </div>

</div>

<script>
const API   = 'http://localhost:3000/api';
const token = localStorage.getItem('token');
const me    = localStorage.getItem('username');

if (!token) window.location.href = 'login.html';

function logout() { localStorage.removeItem('token'); localStorage.removeItem('username'); window.location.href = 'login.html'; }

const medals = ['🥇','🥈','🥉'];
const podiumClass = ['first','second','third'];
const scoreClass  = ['gold','silver','bronze'];

function fmt(val, type) {
    const n = parseFloat(val);
    if (type === 'points')   return Math.round(n).toLocaleString() + ' pts';
    if (type === 'co2')      return n.toFixed(2) + ' kg';
    if (type === 'distance') return n.toFixed(1) + ' km';
    return n;
}

async function load(type, period, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');

    document.getElementById('boardWrap').innerHTML = '<div class="empty-state"><span class="empty-icon">⏳</span>Loading...</div>';

    try {
        const res  = await fetch(`${API}/leaderboard?type=${type}&period=${period}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();

        // My rank
        const rankEl = document.getElementById('myRank');
        if (data.myRank) {
            rankEl.textContent = `You are ranked #${data.myRank} this ${period} 🎉`;
        } else {
            rankEl.textContent = 'Log a trip to appear on the board!';
        }

        const board = data.leaderboard || [];

        if (!board.length) {
            document.getElementById('boardWrap').innerHTML = `
                <div class="empty-state">
                    <span class="empty-icon">🌱</span>
                    No data yet — log a trip to appear here!
                </div>`;
            return;
        }

        // Top 3 podium
        const top3 = board.slice(0, 3);
        const rest  = board.slice(3);

        // Reorder podium: 2nd, 1st, 3rd for visual height effect
        const podiumOrder = [top3[1], top3[0], top3[2]].filter(Boolean);
        const podiumClasses = top3[1] ? ['second','first','third'] : ['first','second','third'];

        let podiumHTML = `<div class="podium">`;
        podiumOrder.forEach((r, i) => {
            const origIdx = top3.indexOf(r);
            const isMe = r.username === me;
            podiumHTML += `
                <div class="podium-card ${podiumClasses[i]}">
                    ${isMe ? '<div class="podium-you">you</div>' : ''}
                    <span class="podium-medal">${medals[origIdx]}</span>
                    <div class="podium-name">${r.username}</div>
                    <div class="podium-score ${scoreClass[origIdx]}">${fmt(r.score, type)}</div>
                    <div class="podium-streak">🔥 ${r.current_streak}d streak</div>
                </div>`;
        });
        podiumHTML += `</div>`;

        // Rest of board
        let restHTML = '';
        if (rest.length) {
            restHTML = `<div class="board-rest">` + rest.map((r, i) => `
                <div class="board-row ${r.username === me ? 'me' : ''}">
                    <div class="row-rank">#${i + 4}</div>
                    <div class="row-name ${r.username === me ? 'me-name' : ''}">${r.username}${r.username === me ? ' 👤' : ''}</div>
                    <div class="row-streak">🔥${r.current_streak}d</div>
                    <div class="row-score">${fmt(r.score, type)}</div>
                </div>
            `).join('') + `</div>`;
        }

        document.getElementById('boardWrap').innerHTML = podiumHTML + restHTML;

    } catch (err) {
        document.getElementById('boardWrap').innerHTML = `
            <div class="empty-state">
                <span class="empty-icon">⚠️</span>
                Could not load leaderboard. Is the server running?
            </div>`;
    }
}

load('points', 'week', null);
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
